<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boccale - 安心カレンダー</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全体：画面いっぱいに広げ、スクロールを禁止 */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Nunito', sans-serif; 
            background-color: #2b2b2b; 
            color: #333; 
            height: 100vh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 全体のスクロールを防止 */
        }

        /* ログイン画面 */
        .container { 
            max-width: 500px; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
        }

        /* メインアプリ：画面に収まるサイズに固定 */
        #mainApp { 
            display: none; 
            background-color: #c9e9ea; 
            padding: 15px; 
            border-radius: 25px; 
            gap: 15px; 
            width: 98vw;
            height: 94vh; /* 上下に少し余白 */
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            flex-direction: row;
        }

        /* 左側：カレンダーエリア */
        .calendar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* カレンダーヘッダー */
        .calendar-header {
            display: flex;
            align-items: flex-end;
            margin-bottom: 10px;
            padding: 8px 20px;
            background-color: #f0fdfd;
            border-radius: 15px;
            height: 70px;
            box-sizing: border-box;
            -webkit-mask-image: radial-gradient(circle 20px at 0 0, transparent 20px, black 21px);
            mask-image: radial-gradient(circle 20px at 0 0, transparent 20px, black 21px);
        }

        .month-number { font-size: 48px; font-weight: 700; line-height: 1; margin-right: 20px; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex: 1;
            font-family: 'Caveat', cursive;
            font-size: 24px;
            text-align: center;
        }

        /* カレンダーグリッド：高さに合わせて自動調整 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr); /* 6行固定で高さを均等に */
            gap: 8px;
            flex: 1; /* 残りの高さをすべて使う */
        }

        .calendar-day {
            background: white;
            padding: 5px 8px;
            position: relative;
            font-family: 'Caveat', cursive;
            font-size: 18px;
            font-weight: 700;
            overflow: hidden; /* タスクがはみ出さないように */
            -webkit-mask-image: radial-gradient(circle 12px at 0 0, transparent 12px, black 13px);
            mask-image: radial-gradient(circle 12px at 0 0, transparent 12px, black 13px);
        }

        .day-prev { background-color: #a8ffff; color: #72d6d6; }
        .day-current { background-color: #ffffff; color: #444; }
        .day-next { background-color: #ffe89e; color: #e5c45e; }
        .color-sun { color: #ff5b5b !important; }
        .color-sat { color: #9c65ff !important; }

        /* 右側：タスクサイドバー */
        .task-window { 
            width: 260px; 
            background: #ffffff; 
            border-radius: 20px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            -webkit-mask-image: radial-gradient(circle 15px at 0 0, transparent 15px, black 16px);
            mask-image: radial-gradient(circle 15px at 0 0, transparent 15px, black 16px);
        }

        /* タスクリストのみスクロール可能にする */
        .task-list { 
            flex: 1; 
            overflow-y: auto; 
            margin-top: 10px;
            padding-right: 5px;
        }
        /* スクロールバーの見た目を細く */
        .task-list::-webkit-scrollbar { width: 5px; }
        .task-list::-webkit-scrollbar-thumb { background: #c9e9ea; border-radius: 10px; }

        .task-item { 
            background: #f0fdfd; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 10px; 
            font-size: 14px;
            font-weight: bold; 
            cursor: grab; 
            border-left: 5px solid #4285F4;
        }

        .placed-task { 
            background: #4285F4; 
            color: white; 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-size: 10px; 
            margin-top: 2px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .add-task-btn {
            font-size: 13px; color: #888; cursor:pointer; 
            border: 2px dashed #eee; padding: 10px; border-radius: 10px; 
            text-align: center; margin-top: 5px;
        }

        .btn { padding: 12px 24px; background-color: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="setupScreen" class="container">
    <h1 style="color: #444; font-size: 40px; margin-bottom: 10px; font-family: 'Caveat', cursive;">boccale</h1>
    <p>日々の余白を、安心に変えるカレンダー。</p>
    <button id="authBtn" class="btn" onclick="handleLogin()">Google でログイン</button>
    <br><br>
    <button style="background:#6c757d" class="btn" onclick="startGuestMode()">アカウント無しでお試し</button>
</div>

<div id="mainApp">
    <div class="calendar-section">
        <div class="calendar-header">
            <div class="month-number">5</div>
            <div class="weekdays">
                <div class="color-sun">sun</div>
                <div>mon</div>
                <div>tue</div>
                <div>wed</div>
                <div>thu</div>
                <div>fri</div>
                <div class="color-sat">sat</div>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="task-window">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0; font-size: 18px;">TODO</h3>
            <button onclick="handleLogout()" style="cursor:pointer; font-size: 10px; border:none; background:none; color:#bbb;">Logout</button>
        </div>
        <div class="add-task-btn" onclick="addNewTaskPrompt()">+ Add Task</div>
        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script>
    // Firebaseの設定は変更なし
    const firebaseConfig = {
        apiKey: "AIzaSyCbyXSgnzkOGU8269J9f8axIkbC34vb_bQ",
        authDomain: "my-calendar-app-495505.firebaseapp.com",
        projectId: "my-calendar-app-495505",
        storageBucket: "my-calendar-app-495505.firebasestorage.app",
        messagingSenderId: "228515909111",
        appId: "1:228515909111:web:9c05cb566cd021f178f2f2",
        measurementId: "G-M5R8P4D22G"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('https://www.googleapis.com/auth/spreadsheets');
    provider.addScope('https://www.googleapis.com/auth/drive.metadata.readonly');

    let accessToken = localStorage.getItem("google_api_token");
    let spreadsheetId = null;
    let isGuestMode = false;

    function startGuestMode() { isGuestMode = true; initCalendarApp(); }

    auth.onAuthStateChanged((user) => {
        if (isGuestMode) return;
        if (user) {
            accessToken = localStorage.getItem("google_api_token");
            if (accessToken) searchDriveForSpreadsheet();
        } else {
            document.getElementById("setupScreen").style.display = "block";
            document.getElementById("mainApp").style.display = "none";
        }
    });

    async function handleLogin() {
        const result = await auth.signInWithPopup(provider);
        accessToken = result.credential.accessToken;
        localStorage.setItem("google_api_token", accessToken);
        searchDriveForSpreadsheet();
    }

    async function searchDriveForSpreadsheet() {
        const q = `name = 'boccale-database' and trashed = false`;
        const url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}`;
        const res = await fetch(url, { headers: { "Authorization": `Bearer ${accessToken}` } });
        const data = await res.json();
        if (data.files && data.files.length > 0) {
            spreadsheetId = data.files[0].id;
            initCalendarApp();
        } else {
            // 新規作成ロジック（省略せず以前のものを継承）
            initCalendarApp(); 
        }
    }

    function initCalendarApp() {
        document.getElementById("setupScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "flex";
        generateCalendar();
        if (!isGuestMode) loadTasks();
    }

    function generateCalendar() {
        const grid = document.getElementById("calendarGrid");
        grid.innerHTML = "";
        const days = [
            {d: 26, type: "day-prev color-sun"}, {d: 27, type: "day-prev"}, {d: 28, type: "day-prev"}, {d: 29, type: "day-prev"}, {d: 30, type: "day-prev"},
            {d: 1, type: "day-current"}, {d: 2, type: "day-current color-sat"}, 
            {d: 3, type: "day-current color-sun"}, {d: 4, type: "day-current"}, {d: 5, type: "day-current"}, {d: 6, type: "day-current"}, {d: 7, type: "day-current"}, {d: 8, type: "day-current"}, {d: 9, type: "day-current color-sat"},
            {d: 10, type: "day-current color-sun"}, {d: 11, type: "day-current"}, {d: 12, type: "day-current"}, {d: 13, type: "day-current"}, {d: 14, type: "day-current"}, {d: 15, type: "day-current"}, {d: 16, type: "day-current color-sat"},
            {d: 17, type: "day-current color-sun"}, {d: 18, type: "day-current"}, {d: 19, type: "day-current"}, {d: 20, type: "day-current"}, {d: 21, type: "day-current"}, {d: 22, type: "day-current"}, {d: 23, type: "day-current color-sat"},
            {d: 24, type: "day-current color-sun"}, {d: 25, type: "day-current"}, {d: 26, type: "day-current"}, {d: 27, type: "day-current"}, {d: 28, type: "day-current"}, {d: 29, type: "day-current"}, {d: 30, type: "day-current color-sat"},
            {d: 31, type: "day-current color-sun"},
            {d: 1, type: "day-next"}, {d: 2, type: "day-next"}, {d: 3, type: "day-next"}, {d: 4, type: "day-next"}, {d: 5, type: "day-next"}, {d: 6, type: "day-next color-sat"}
        ];
        days.forEach(dayInfo => grid.appendChild(createCell(dayInfo)));
    }

    function createCell(info) {
        const div = document.createElement("div");
        div.className = `calendar-day ${info.type}`;
        div.innerHTML = `<span>${info.d}</span>`;
        if (info.type.includes("day-current")) {
            const dateStr = `2026-05-${info.d.toString().padStart(2, '0')}`;
            div.id = `cell-${dateStr}`;
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                const title = e.dataTransfer.getData("text");
                renderPlacedTask(div.id, title);
                saveTask(dateStr, title);
            };
        }
        return div;
    }

    function renderPlacedTask(cellId, title) {
        const cell = document.getElementById(cellId);
        if (cell) {
            const el = document.createElement("div");
            el.className = "placed-task";
            el.innerText = title;
            cell.appendChild(el);
        }
    }

    function addNewTaskPrompt() {
        const t = prompt("Task:");
        if (!t) return;
        const el = document.createElement("div");
        el.className = "task-item";
        el.innerText = t;
        el.draggable = true;
        el.ondragstart = (ev) => ev.dataTransfer.setData("text", t);
        document.getElementById("taskList").appendChild(el);
    }

    async function loadTasks() { /* 以前のスプレッドシート読み込みロジック */ }
    function saveTask(date, title) { /* 以前のスプレッドシート保存ロジック */ }
    function handleLogout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
