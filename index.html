<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boccale - 安心カレンダー</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* SVGの比率に合わせてボックスの比率を定義 */
            --beaker-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 0 9 10"><path d="M -2 0 L 6 0 Q 7 0 7 1 L 7 9 Q 7 10 6 10 L 0 10 Q -1 10 -1 9 L -1 1 Q -1 0 -2 0" fill="black"/></svg>');
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Nunito', sans-serif; 
            background-color: #2b2b2b; 
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        #mainApp { 
            background-color: #c9e9ea; 
            padding: 20px; 
            border-radius: 25px; 
            gap: 20px; 
            width: 96vw;
            height: 90vh; 
            box-sizing: border-box;
            display: none; /* JSでflexに切り替え */
            flex-direction: row;
        }

        .calendar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; /* flex崩れ防止 */
        }

        .calendar-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 15px;
            background-color: #f0fdfd;
            height: 60px;
            -webkit-mask-image: var(--beaker-mask);
            mask-image: var(--beaker-mask);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }

        .month-number { font-size: 40px; font-weight: 700; margin-right: 20px; font-family: 'Caveat'; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            flex: 1;
            font-family: 'Caveat', cursive;
            font-size: 20px;
            text-align: center;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            flex: 1;
            align-content: start; /* 上詰めで配置 */
        }

        /* ★ バグ修正の核心部分 ★ */
        .calendar-day {
            background: white;
            padding: 8px;
            position: relative;
            font-family: 'Caveat', cursive;
            font-size: 18px;
            
            /* 縦横比をSVGの比率(9:10)に固定 */
            aspect-ratio: 9 / 10; 
            width: 100%; /* グリッド幅いっぱいに広げる */
            
            /* マスク設定：形を維持してボックスにフィットさせる */
            -webkit-mask-image: var(--beaker-mask);
            mask-image: var(--beaker-mask);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        .day-prev { background-color: #a8ffff; color: #72d6d6; }
        .day-current { background-color: #ffffff; color: #444; }
        .day-next { background-color: #ffe89e; color: #e5c45e; }
        .color-sun { color: #ff5b5b !important; }
        .color-sat { color: #9c65ff !important; }

        .task-window { 
            width: 280px; 
            background: #ffffff; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
            -webkit-mask-image: var(--beaker-mask);
            mask-image: var(--beaker-mask);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }

        .task-list { flex: 1; overflow-y: auto; margin-top: 10px; }

        .task-item { 
            background: #f0fdfd; padding: 10px; margin-bottom: 8px; border-radius: 10px; 
            font-size: 14px; font-weight: bold; cursor: grab; border-left: 5px solid #4285F4;
        }

        .placed-task { 
            background: #4285F4; color: white; padding: 2px 5px; border-radius: 4px; 
            font-size: 10px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis;
            font-family: 'Nunito', sans-serif;
        }

        .add-task-btn {
            font-size: 13px; color: #888; cursor:pointer; border: 2px dashed #eee; 
            padding: 10px; border-radius: 10px; text-align: center;
        }

        #setupScreen { background: white; padding: 40px; border-radius: 20px; text-align: center; }
        .btn { padding: 12px 24px; background-color: #4285F4; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="setupScreen">
    <h1 style="color: #444; font-size: 40px; font-family: 'Caveat';">boccale</h1>
    <button class="btn" onclick="startGuestMode()">アカウント無しでお試し</button>
</div>

<div id="mainApp">
    <div class="calendar-section">
        <div class="calendar-header">
            <div class="month-number">5</div>
            <div class="weekdays">
                <div class="color-sun">sun</div><div>mon</div><div>tue</div><div>wed</div><div>thu</div><div>fri</div><div class="color-sat">sat</div>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="task-window">
        <h3 style="margin:0; font-size: 18px;">TODO</h3>
        <div class="add-task-btn" onclick="addNewTaskPrompt()">+ Add Task</div>
        <div class="task-list" id="taskList"></div>
    </div>
</div>

<script>
    function startGuestMode() {
        document.getElementById("setupScreen").style.display = "none";
        document.getElementById("mainApp").style.display = "flex";
        generateCalendar();
    }

    function generateCalendar() {
        const grid = document.getElementById("calendarGrid");
        grid.innerHTML = "";
        // ダミーデータ生成（画像image_ba049c.pngの並びに準拠）
        const days = [
            {d: 26, type: "day-prev color-sun"}, {d: 27, type: "day-prev"}, {d: 28, type: "day-prev"}, {d: 29, type: "day-prev"}, {d: 30, type: "day-prev"},
            {d: 1, type: "day-current"}, {d: 2, type: "day-current color-sat"}, 
            {d: 3, type: "day-current color-sun"}, {d: 4, type: "day-current"}, {d: 5, type: "day-current"}, {d: 6, type: "day-current"}, {d: 7, type: "day-current"}, {d: 8, type: "day-current"}, {d: 9, type: "day-current color-sat"},
            {d: 10, type: "day-current color-sun"}, {d: 11, type: "day-current"}, {d: 12, type: "day-current"}, {d: 13, type: "day-current"}, {d: 14, type: "day-current"}, {d: 15, type: "day-current"}, {d: 16, type: "day-current color-sat"},
            {d: 17, type: "day-current color-sun"}, {d: 18, type: "day-current"}, {d: 19, type: "day-current"}, {d: 20, type: "day-current"}, {d: 21, type: "day-current"}, {d: 22, type: "day-current"}, {d: 23, type: "day-current color-sat"},
            {d: 24, type: "day-current color-sun"}, {d: 25, type: "day-current"}, {d: 26, type: "day-current"}, {d: 27, type: "day-current"}, {d: 28, type: "day-current"}, {d: 29, type: "day-current"}, {d: 30, type: "day-current color-sat"},
            {d: 31, type: "day-current color-sun"},
            {d: 1, type: "day-next"}, {d: 2, type: "day-next"}, {d: 3, type: "day-next"}, {d: 4, type: "day-next"}, {d: 5, type: "day-next"}, {d: 6, type: "day-next color-sat"}
        ];
        days.forEach(info => {
            const div = document.createElement("div");
            div.className = `calendar-day ${info.type}`;
            div.innerHTML = `<span>${info.d}</span>`;
            div.ondragover = (e) => e.preventDefault();
            div.ondrop = (e) => {
                const title = e.dataTransfer.getData("text");
                const task = document.createElement("div");
                task.className = "placed-task";
                task.innerText = title;
                div.appendChild(task);
            };
            grid.appendChild(div);
        });
    }

    function addNewTaskPrompt() {
        const t = prompt("Task:");
        if (!t) return;
        const el = document.createElement("div");
        el.className = "task-item";
        el.innerText = t;
        el.draggable = true;
        el.ondragstart = (ev) => ev.dataTransfer.setData("text", t);
        document.getElementById("taskList").appendChild(el);
    }
</script>
</body>
</html>
